<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de moedas</title>
</head>

<body>
    <h1>Conversor de moedas</h1>

    <form method="get" action="/converter/">
        <label>Moeda origem:</label>
        <select name="origem" required>
            <option value="">Selecione</option>

            <option value="USD">USD - Dólar</option>
            <option value="BRL">BRL - Real</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - Libra</option>
            <option value="JPY">JPY - Iene</option>
            <option value="CAD">CAD - Dólar Canadense</option>
            <option value="AUD">AUD - Dólar Australiano</option>
            <option value="CHF">CHF - Franco Suiço</option>
            <option value="CNY">CNY - Yuan Chines</option>
            <option value="ARS">ARS - Peso Argentino</option>
        </select>

        <br><br>

        <label>Moeda destino:</label>
        <select name="destino" required>
            <option value="">Selecione</option>

            <option value="USD">USD - Dólar</option>
            <option value="BRL">BRL - Real</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - Libra</option>
            <option value="JPY">JPY - Iene</option>
            <option value="CAD">CAD - Dólar Canadense</option>
            <option value="AUD">AUD - Dólar Australiano</option>
            <option value="CHF">CHF - Franco Suiço</option>
            <option value="CNY">CNY - Yuan Chines</option>
            <option value="ARS">ARS - Peso Argentino</option>
        </select>

        <label>Valor:</label>
        <input type="number" step="0.01" name="valor" placeholder="Digite o valor" required>

        <br><br>

        <button type="submit">Converter</button>
    </form>

    {% if valor_convertido %}

    <h2>Resultado:</h2>

    <p>
        <strong>
            {{valor_original}} {{origem}}
            =
            {{valor_convertido}} {{destino}}
        </strong>
    </p>

    {% endif %}
</body>

</html>
